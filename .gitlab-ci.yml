default:
  image: gradle:8.10.2-jdk21
  tags: [docker]
  interruptible: true
  before_script:
    - export ANDROID_HOME="$CI_PROJECT_DIR/.android-sdk"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
    - |
      if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
        echo ">>> Installing Android command-line tools"
        apt-get update -qq && apt-get install -y --no-install-recommends curl unzip > /dev/null
        mkdir -p "$ANDROID_HOME/cmdline-tools"
        curl -sSL -o /tmp/cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q /tmp/cmdline.zip -d "$ANDROID_HOME/cmdline-tools"
        mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
        rm /tmp/cmdline.zip
      fi
    - |
      if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
        echo ">>> Accepting licenses and installing SDK platform 35 / build-tools 35.0.0"
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null
      fi
    - cd "$CI_PROJECT_DIR"

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-cache"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.configureondemand=true"

stages:
  - build
  - publish

cache:
  key:
    files:
      - gradle/libs.versions.toml
      - app/build.gradle.kts
  paths:
    - .gradle-cache/caches/
    - .gradle-cache/wrapper/
    - .android-sdk/
    - .gradle/

workflow:
  rules:
    # Development commits are pushed to the branch freely WITHOUT triggering a
    # build — intermediate APKs aren't wanted, we only build a release when a
    # feature set is complete. Builds run only on:
    #   - a version tag (v1.2.3) → full build + signed release, for testing
    #   - a manual web/API trigger → on-demand checkpoint compile when needed
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"

# NOTE: there is no `test:unit` job — the app currently has no unit tests, and
# it never gated the release anyway (release:publish only needs build:release, so
# they ran in parallel). When real tests are added, reintroduce a `test` job AND
# make release:publish `needs` it so it actually blocks a bad release.

# Signed release APK — the only APK we ship. The keystore is decoded from
# RELEASE_KEYSTORE_B64 (a project CI variable) into a scratch file outside the
# work tree; app/build.gradle.kts reads it via RELEASE_KEYSTORE_FILE + the
# three password/alias env vars.
#
# For tag builds, the APK is pushed to the project's Generic Package Registry
# so the Release page can link to a URL that survives artifact expiration and
# pipeline cleanup. The job-level artifact stays around as a 26-week safety net.
build:release:
  stage: build
  variables:
    RELEASE_KEYSTORE_FILE: "$CI_PROJECT_DIR/.release-keystore.p12"
  script:
    - |
      if [ -z "$RELEASE_KEYSTORE_B64" ]; then
        echo "RELEASE_KEYSTORE_B64 not set — release will be unsigned."
      else
        echo "$RELEASE_KEYSTORE_B64" | base64 -d > "$RELEASE_KEYSTORE_FILE"
        echo ">>> Keystore decoded ($(wc -c < "$RELEASE_KEYSTORE_FILE") bytes)"
      fi
    - gradle assembleStandardRelease --no-daemon --stacktrace --warning-mode=summary
    - rm -f "$RELEASE_KEYSTORE_FILE"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        PKG_VERSION="${CI_COMMIT_TAG#v}"
        # The downloaded filename = the URL's last segment, so put the version in
        # it (3x-ui-manager-<version>.apk) while the local Gradle output keeps its
        # static name.
        echo ">>> Uploading 3x-ui-manager-$PKG_VERSION.apk to generic package registry @ $PKG_VERSION"
        # cwd is $CI_PROJECT_DIR (set in before_script).
        curl --fail --silent --show-error --request PUT \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file app/build/outputs/apk/standard/release/3x-ui-manager-standard-release.apk \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/xui-android/$PKG_VERSION/3x-ui-manager-$PKG_VERSION.apk"
        echo
      fi
  artifacts:
    name: "xui-android-release-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    paths:
      - app/build/outputs/apk/standard/release/3x-ui-manager-standard-release.apk
      - app/build/outputs/mapping/standardRelease/mapping.txt
    expire_in: 26 weeks
    when: on_success

# Auto-create a GitLab Release whenever a v* tag's pipeline goes green.
# The semver tag enforces "new release = new version" without manual
# release-page editing — to ship a new build to the Releases page, push a
# new tag, full stop.
#
# release-cli (separate image) builds the GitLab Release. It waits for the
# release APK build without downloading its artifact — it only needs the
# package-registry URL.
release:publish:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:release
      artifacts: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  before_script: []
  script:
    # release-cli is invoked directly (not via the `release:` keyword)
    # because YAML-level variable substitution happens BEFORE script runs,
    # so $PKG_VERSION computed here would be empty when it lands in URLs.
    # Doing it in shell means shell parameter expansion (#v prefix strip)
    # works and the URLs come out with the correct version.
    - PKG_VERSION="${CI_COMMIT_TAG#v}"
    - PKG_BASE="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/xui-android/$PKG_VERSION"
    - APK="3x-ui-manager-$PKG_VERSION.apk"
    - echo "Publishing GitLab Release for $CI_COMMIT_TAG (package version $PKG_VERSION)"
    # The release description (and thus the Releases page) is in English and is
    # built from this version's section of the English changelog — i.e. the diff
    # against the previous version. The section body is extracted with awk
    # (everything between "## [VERSION]" and the next "## [" header).
    - |
      NOTES="$(awk -v ver="$PKG_VERSION" '
        $0 ~ "^## \\[" ver "\\]" { grab=1; next }
        grab && /^## \[/ { exit }
        grab { print }
      ' CHANGELOG.md)"
      # Drop leading blank lines so the notes start at the first heading.
      NOTES="$(printf '%s\n' "$NOTES" | sed -e '/./,$!d')"
      if [ -z "$NOTES" ]; then
        NOTES="See the [changelog]($CI_PROJECT_URL/-/blob/$CI_COMMIT_TAG/CHANGELOG.md)."
      fi
      # Build the description with printf (not a heredoc) so every line of this
      # job stays indented inside the YAML block scalar — a column-0 heredoc
      # body would terminate the block and break YAML parsing.
      HEADER="## What's new in $CI_COMMIT_TAG"
      FOOTER="$(printf '### Download\n- `%s` — signed APK, ready to install on a phone.\n\n📝 Full [changelog](%s/-/blob/%s/CHANGELOG.md).\n\nBuilt by [pipeline #%s](%s) from %s.' "$APK" "$CI_PROJECT_URL" "$CI_COMMIT_TAG" "$CI_PIPELINE_ID" "$CI_PIPELINE_URL" "$CI_COMMIT_SHORT_SHA")"
      DESC="$(printf '%s\n\n%s\n\n%s\n' "$HEADER" "$NOTES" "$FOOTER")"
      release-cli create \
        --tag-name "$CI_COMMIT_TAG" \
        --name "$CI_COMMIT_TAG" \
        --description "$DESC" \
        --assets-link "{\"name\":\"$APK (signed)\",\"url\":\"$PKG_BASE/$APK\",\"link_type\":\"package\"}"
