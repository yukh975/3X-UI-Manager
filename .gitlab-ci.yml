default:
  image: gradle:8.10.2-jdk21
  tags: []
  interruptible: true
  before_script:
    - export ANDROID_HOME="$CI_PROJECT_DIR/.android-sdk"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
    - |
      if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
        echo ">>> Installing Android command-line tools"
        apt-get update -qq && apt-get install -y --no-install-recommends curl unzip > /dev/null
        mkdir -p "$ANDROID_HOME/cmdline-tools"
        curl -sSL -o /tmp/cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q /tmp/cmdline.zip -d "$ANDROID_HOME/cmdline-tools"
        mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
        rm /tmp/cmdline.zip
      fi
    - |
      if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
        echo ">>> Accepting licenses and installing SDK platform 35 / build-tools 35.0.0"
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null
      fi
    - cd "$CI_PROJECT_DIR/android"

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-cache"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.configureondemand=true"

stages:
  - build
  - test
  - publish

cache:
  key:
    files:
      - android/gradle/libs.versions.toml
      - android/app/build.gradle.kts
  paths:
    - .gradle-cache/caches/
    - .gradle-cache/wrapper/
    - .android-sdk/
    - android/.gradle/

workflow:
  rules:
    # Development commits are pushed to the branch freely WITHOUT triggering a
    # build — intermediate APKs aren't wanted, we only build a release when a
    # feature set is complete. Builds run only on:
    #   - a version tag (v1.2.3) → full build + signed release, for testing
    #   - a manual web/API trigger → on-demand checkpoint compile when needed
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"

build:debug:
  stage: build
  script:
    # The gradle:8.10.2-jdk21 image already has the right Gradle. Skip the
    # wrapper step entirely — `gradle wrapper --gradle-version` does a HEAD
    # request to services.gradle.org which the runner can't reach.
    - gradle assembleDebug --no-daemon --stacktrace --warning-mode=summary
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        PKG_VERSION="${CI_COMMIT_TAG#v}"
        echo ">>> Uploading app-debug.apk to generic package registry @ $PKG_VERSION"
        # cwd is $CI_PROJECT_DIR/android (set in before_script).
        curl --fail --silent --show-error --request PUT \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file app/build/outputs/apk/debug/app-debug.apk \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/xui-android/$PKG_VERSION/app-debug.apk"
        echo
      fi
  artifacts:
    name: "xui-android-debug-$CI_COMMIT_SHORT_SHA"
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk
      - android/app/build/outputs/mapping/
    expire_in: 2 weeks
    when: on_success

test:unit:
  stage: test
  needs: ["build:debug"]
  script:
    - gradle testDebugUnitTest --no-daemon --stacktrace --warning-mode=summary
  artifacts:
    name: "xui-android-test-$CI_COMMIT_SHORT_SHA"
    paths:
      - android/app/build/reports/tests/
    reports:
      junit:
        - android/app/build/test-results/**/TEST-*.xml
    when: always
    expire_in: 1 week

# Signed release APK — runs only after build:debug succeeds (the "green build"
# gate), so a broken commit never produces a release artifact. The keystore
# is decoded from RELEASE_KEYSTORE_B64 (set as a project CI variable) into a
# scratch file outside the work tree; app/build.gradle.kts reads it via
# RELEASE_KEYSTORE_FILE + the three password/alias env vars.
#
# For tag builds, the APK is also pushed to the project's Generic Package
# Registry so the Release page can link to a URL that survives artifact
# expiration and pipeline cleanup. The job-level artifact stays around as a
# 26-week safety net but isn't the canonical download.
build:release:
  stage: build
  needs: ["build:debug"]
  variables:
    RELEASE_KEYSTORE_FILE: "$CI_PROJECT_DIR/.release-keystore.p12"
  script:
    - |
      if [ -z "$RELEASE_KEYSTORE_B64" ]; then
        echo "RELEASE_KEYSTORE_B64 not set — release will be unsigned."
      else
        echo "$RELEASE_KEYSTORE_B64" | base64 -d > "$RELEASE_KEYSTORE_FILE"
        echo ">>> Keystore decoded ($(wc -c < "$RELEASE_KEYSTORE_FILE") bytes)"
      fi
    - gradle assembleRelease --no-daemon --stacktrace --warning-mode=summary
    - rm -f "$RELEASE_KEYSTORE_FILE"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        PKG_VERSION="${CI_COMMIT_TAG#v}"
        echo ">>> Uploading app-release.apk to generic package registry @ $PKG_VERSION"
        # cwd is $CI_PROJECT_DIR/android (set in before_script).
        curl --fail --silent --show-error --request PUT \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file app/build/outputs/apk/release/app-release.apk \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/xui-android/$PKG_VERSION/app-release.apk"
        echo
      fi
  artifacts:
    name: "xui-android-release-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    paths:
      - android/app/build/outputs/apk/release/app-release.apk
      - android/app/build/outputs/mapping/release/mapping.txt
    expire_in: 26 weeks
    when: on_success

# Auto-create a GitLab Release whenever a v* tag's pipeline goes green.
# The semver tag enforces "new release = new version" without manual
# release-page editing — to ship a new build to the Releases page, push a
# new tag, full stop.
#
# `release:` keyword is handled by GitLab's release-cli, which is why this
# job uses that image and overrides the default before_script (the Android
# SDK installer would otherwise try to run in a non-apt-equipped image).
# `needs:` waits for both APK builds to succeed without downloading their
# artifacts here — release-cli only needs the link URLs.
release:publish:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:debug
      artifacts: false
    - job: build:release
      artifacts: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  before_script: []
  script:
    # release-cli is invoked directly (not via the `release:` keyword)
    # because YAML-level variable substitution happens BEFORE script runs,
    # so $PKG_VERSION computed here would be empty when it lands in URLs.
    # Doing it in shell means shell parameter expansion (#v prefix strip)
    # works and the URLs come out with the correct version.
    - PKG_VERSION="${CI_COMMIT_TAG#v}"
    - PKG_BASE="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/xui-android/$PKG_VERSION"
    - echo "Publishing GitLab Release for $CI_COMMIT_TAG (package version $PKG_VERSION)"
    - |
      release-cli create \
        --tag-name "$CI_COMMIT_TAG" \
        --name "$CI_COMMIT_TAG" \
        --description "Built by [pipeline #$CI_PIPELINE_ID]($CI_PIPELINE_URL) from $CI_COMMIT_SHORT_SHA.

      - \`app-release.apk\` — signed, ready to sideload.
      - \`app-debug.apk\` — debug build (applicationId \`net.yukh.xui.debug\`, installs side-by-side with release).

      APKs live in the project's [Generic Package Registry]($CI_PROJECT_URL/-/packages) — these links keep working after pipeline artifacts expire and after pipelines are cleaned up." \
        --assets-link "{\"name\":\"app-release.apk (signed)\",\"url\":\"$PKG_BASE/app-release.apk\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"app-debug.apk\",\"url\":\"$PKG_BASE/app-debug.apk\",\"link_type\":\"package\"}"
