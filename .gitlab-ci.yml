default:
  image: gradle:8.10.2-jdk21
  tags: []
  interruptible: true
  before_script:
    - export ANDROID_HOME="$CI_PROJECT_DIR/.android-sdk"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
    - |
      if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
        echo ">>> Installing Android command-line tools"
        apt-get update -qq && apt-get install -y --no-install-recommends curl unzip > /dev/null
        mkdir -p "$ANDROID_HOME/cmdline-tools"
        curl -sSL -o /tmp/cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q /tmp/cmdline.zip -d "$ANDROID_HOME/cmdline-tools"
        mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
        rm /tmp/cmdline.zip
      fi
    - |
      if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
        echo ">>> Accepting licenses and installing SDK platform 35 / build-tools 35.0.0"
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" > /dev/null
      fi
    - cd "$CI_PROJECT_DIR/android"

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-cache"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.configureondemand=true"

stages:
  - build
  - test

cache:
  key:
    files:
      - android/gradle/libs.versions.toml
      - android/app/build.gradle.kts
  paths:
    - .gradle-cache/caches/
    - .gradle-cache/wrapper/
    - .android-sdk/
    - android/.gradle/

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - android/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH
      changes:
        - android/**/*
        - .gitlab-ci.yml
    - if: $CI_PIPELINE_SOURCE == "web"

build:debug:
  stage: build
  script:
    # The gradle:8.10.2-jdk21 image already has the right Gradle. Skip the
    # wrapper step entirely — `gradle wrapper --gradle-version` does a HEAD
    # request to services.gradle.org which the runner can't reach.
    - gradle assembleDebug --no-daemon --stacktrace --warning-mode=summary
  artifacts:
    name: "xui-android-debug-$CI_COMMIT_SHORT_SHA"
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk
      - android/app/build/outputs/mapping/
    expire_in: 2 weeks
    when: on_success

test:unit:
  stage: test
  needs: ["build:debug"]
  script:
    - gradle testDebugUnitTest --no-daemon --stacktrace --warning-mode=summary
  artifacts:
    name: "xui-android-test-$CI_COMMIT_SHORT_SHA"
    paths:
      - android/app/build/reports/tests/
    reports:
      junit:
        - android/app/build/test-results/**/TEST-*.xml
    when: always
    expire_in: 1 week

# Signed release APK — runs only after build:debug succeeds (the "green build"
# gate), so a broken commit never produces a release artifact. The keystore
# is decoded from RELEASE_KEYSTORE_B64 (set as a project CI variable) into a
# scratch file outside the work tree; app/build.gradle.kts reads it via
# RELEASE_KEYSTORE_FILE + the three password/alias env vars. Tagged commits
# get a 6-month retention; branch builds get 4 weeks.
build:release:
  stage: build
  needs: ["build:debug"]
  variables:
    RELEASE_KEYSTORE_FILE: "$CI_PROJECT_DIR/.release-keystore.p12"
  script:
    - |
      if [ -z "$RELEASE_KEYSTORE_B64" ]; then
        echo "RELEASE_KEYSTORE_B64 not set — release will be unsigned."
      else
        echo "$RELEASE_KEYSTORE_B64" | base64 -d > "$RELEASE_KEYSTORE_FILE"
        echo ">>> Keystore decoded ($(wc -c < "$RELEASE_KEYSTORE_FILE") bytes)"
      fi
    - gradle assembleRelease --no-daemon --stacktrace --warning-mode=summary
    - rm -f "$RELEASE_KEYSTORE_FILE"
  artifacts:
    name: "xui-android-release-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    paths:
      - android/app/build/outputs/apk/release/app-release.apk
      - android/app/build/outputs/mapping/release/mapping.txt
    expire_in: 4 weeks
    when: on_success
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      variables:
        RETENTION: "26 weeks"
    - if: $CI_COMMIT_BRANCH
